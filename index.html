    <script>
      // Prevent third-party libraries from crashing the app by trying to override the read-only fetch getter
      (function() {
        const originalFetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function() { 
              console.warn('Blocked attempt to override window.fetch'); 
            },
            configurable: true
          });
        } catch (e) {
          // If we can't redefine it, it's already locked, which is fine
        }
      })();
    </script>
